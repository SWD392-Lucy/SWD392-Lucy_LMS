services:
  postgres:
    image: postgres:16-alpine
    container_name: lucy-content-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lucy_content}
      POSTGRES_USER: ${POSTGRES_USER:-lucy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - lucy-content-postgres:/var/lib/postgresql/data

volumes:
  lucy-content-postgres:
